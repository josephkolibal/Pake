name: Build App With Pake CLI

on:
  workflow_dispatch:
    inputs:
      url:
        description: "Website URL"
        required: true
      name:
        description: "App name (lowercase, no spaces)"
        required: true
      icon:
        description: "Icon URL (optional)"
        required: false
      width:
        description: "Window width"
        required: false
        default: "1280"
      height:
        description: "Window height"
        required: false
        default: "800"
      targets:
        description: "Package format (appimage or deb)"
        required: false
        default: "appimage"

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          target: x86_64-unknown-linux-gnu

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: "9"
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libdbus-1-dev libsoup-3.0-dev \
            libjavascriptcoregtk-4.1-dev \
            libwebkit2gtk-4.1-dev \
            build-essential curl wget file \
            libxdo-dev libssl-dev libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev pkg-config \
            binutils-x86-64-linux-gnu

      - name: Fix strip tool
        run: |
          sudo ln -sf /usr/bin/x86_64-linux-gnu-strip /usr/local/bin/strip

      - name: Install pake-cli
        run: npm install -g pake-cli

      - name: Build app
        env:
          NO_STRIP: "1"
        run: |
          pake "${{ github.event.inputs.url }}" \
            --name "${{ github.event.inputs.name }}" \
            --width ${{ github.event.inputs.width }} \
            --height ${{ github.event.inputs.height }} \
            --targets ${{ github.event.inputs.targets }}

      - name: Upload AppImage
        uses: actions/upload-artifact@v4
        with:
          name: ${{ github.event.inputs.name }}-Linux-AppImage
          path: "*.AppImage"
          retention-days: 3
          if-no-files-found: warn
